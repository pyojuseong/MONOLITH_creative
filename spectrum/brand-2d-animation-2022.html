<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기업브랜딩을 활용한 2D 애니메이션 | MONOLITH Creative</title>
  <style>
    :root { --ink:#101113; --muted:#747981; --line:rgba(16,24,40,.1); --paper:#f2f2f2; --blue:#0554f2; --white:#fff; --radius:8px; --max:1180px; --wide:1500px; --shadow:0 24px 70px rgba(5,84,242,.12); }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; background:var(--paper); color:var(--ink); }
    body { min-width:320px; overflow-x:hidden; font-family:"Pretendard","Inter","Noto Sans KR",system-ui,-apple-system,BlinkMacSystemFont,sans-serif; line-height:1.5; background:var(--paper); }
    a { color:inherit; text-decoration:none; } img { display:block; width:100%; }
    .noise { pointer-events:none; position:fixed; inset:0; z-index:100; opacity:.035; background-image:linear-gradient(90deg,rgba(0,0,0,.42) 1px,transparent 1px),linear-gradient(rgba(0,0,0,.42) 1px,transparent 1px); background-size:48px 48px; mix-blend-mode:multiply; }
    .nav { position:relative; z-index:10; width:min(calc(100% - 32px),var(--max)); height:58px; display:flex; align-items:center; gap:18px; margin:18px auto 0; padding:0 10px 0 28px; border:1px solid rgba(255,255,255,.75); border-radius:999px; background:rgba(242,242,242,.78); box-shadow:0 18px 60px rgba(5,20,45,.08); backdrop-filter:blur(18px); }
    .brand { display:inline-flex; align-items:center; justify-content:center; width:52px; height:52px; flex:0 0 auto; } .brand-logo { width:38px; height:auto; }
    .nav-links { display:flex; align-items:center; gap:clamp(20px,3vw,44px); margin-left:14px; color:rgba(13,17,23,.68); font-size:15px; font-weight:800; }
    .contact-pill { min-width:112px; height:42px; display:inline-flex; align-items:center; justify-content:center; margin-left:auto; border-radius:999px; background:var(--blue); color:var(--white); font-size:15px; font-weight:900; line-height:1; box-shadow:0 14px 30px rgba(5,84,242,.22); }
    .page { min-height:100vh; padding-bottom:120px; }
    .hero-banner { width:min(calc(100% - 32px),var(--wide)); margin:26px auto 0; overflow:hidden; border-radius:var(--radius); background:#e9edf4; box-shadow:var(--shadow); }
    .hero-banner img { height:auto; object-fit:contain; cursor:zoom-in; }
    .title-wrap { width:min(calc(100% - 32px),var(--max)); margin:72px auto 0; }
    .title-wrap h1 { font-size:clamp(28px,2.4vw,44px); line-height:1.15; font-weight:900; letter-spacing:0; word-break:keep-all; }
    .image-lightbox { position:fixed; inset:0; z-index:120; display:inline-flex; align-items:center; justify-content:center; line-height:1; padding:32px; border:0; background:rgba(13,17,23,.86); opacity:0; pointer-events:none; transition:opacity .22s ease; }
    .image-lightbox.is-open { opacity:1; pointer-events:auto; } .image-lightbox img { width:auto; max-width:min(94vw,1600px); max-height:90vh; object-fit:contain; border-radius:var(--radius); box-shadow:0 32px 90px rgba(0,0,0,.34); cursor:zoom-out; }
    .to-top { position:fixed; right:24px; bottom:24px; z-index:80; width:46px; height:46px; display:inline-flex; align-items:center; justify-content:center; line-height:1; border:1px solid rgba(13,17,23,.12); border-radius:999px; background:rgba(255,255,255,.82); color:var(--ink); font-size:20px; font-weight:900; line-height:1; cursor:pointer; box-shadow:0 16px 42px rgba(5,20,45,.12); backdrop-filter:blur(14px); }
    @media (max-width:860px) { .nav { height:auto; min-height:58px; flex-wrap:wrap; gap:10px; padding:8px 10px 8px 16px; } .nav-links { order:3; width:100%; justify-content:space-between; gap:12px; margin:0; padding:0 8px 4px; font-size:13px; } .title-wrap { margin-top:52px; } }
  
    .to-top { display: inline-flex; align-items: center; justify-content: center; line-height: 1; font-size: 0; padding: 0; }
    .to-top-icon { width: 24px; height: 24px; display: block; flex: 0 0 auto; }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <nav class="nav" aria-label="Primary">
    <a class="brand" href="../index.html#top" aria-label="MONOLITH Creative 홈"><img class="brand-logo" src="../01_Logo/logo_1_배경색이 %23F2F2F2일때.webp" alt="MONOLITH Creative" /></a>
    <div class="nav-links"><a href="../index.html#concept">Concept</a><a href="../index.html#project">Project</a><a href="../index.html#workflow">Workflow</a><a href="../index.html#spectrum">Spectrum</a></div>
    <a class="contact-pill" href="mailto:contact@monolithcreative.kr">Contact</a>
  </nav>
  <main class="page">
    <section class="hero-banner" aria-label="기업브랜딩을 활용한 2D 애니메이션 메인 배너"><img src="../05_Spectrum/13_기업브랜딩을 활용한 2D 애니메이션_2022/상세페이지 내용과 이미지 (추후 추가예정)/01_mainbanner/플레이 안될 때 썸네일.webp" alt="기업브랜딩을 활용한 2D 애니메이션 메인 배너" /></section>
    <section class="title-wrap"><h1>기업브랜딩을 활용한 2D 애니메이션</h1></section>
  </main>
  <button class="image-lightbox" type="button" aria-label="이미지 크게 보기 닫기"><img alt="" /></button>
  <button class="to-top" type="button" aria-label="맨 위로 이동"><svg class="to-top-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 19V5M5 12l7-7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg></button>
  <script>
    document.querySelector(".to-top")?.addEventListener("click", () => { window.scrollTo({ top: 0, behavior: "smooth" }); });
    const lightbox = document.querySelector(".image-lightbox");
    const lightboxImage = lightbox?.querySelector("img");
    document.querySelectorAll(".hero-banner img").forEach((image) => { image.addEventListener("click", () => { if (!lightbox || !lightboxImage) return; lightboxImage.src = image.currentSrc || image.src; lightboxImage.alt = image.alt || "Expanded project image"; lightbox.classList.add("is-open"); }); });
    lightbox?.addEventListener("click", () => { lightbox.classList.remove("is-open"); if (lightboxImage) lightboxImage.removeAttribute("src"); });
    document.addEventListener("keydown", (event) => { if (event.key === "Escape") { lightbox?.classList.remove("is-open"); if (lightboxImage) lightboxImage.removeAttribute("src"); } });
  </script>
</body>
</html>
